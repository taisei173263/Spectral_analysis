experiment_id: EXP-005
name: exp005_attack_optuna
description: Higher-variance candidate using metadata features and optional Optuna tuning.
seed: 2026

paths:
  train_csv: data/raw/train.csv
  test_csv: data/raw/test.csv
  sample_submit_csv: data/raw/sample_submit.csv
  output_submission_csv: outputs/submissions/exp005_attack_submission.csv
  experiment_dir: outputs/experiments/EXP-005

target:
  column: 含水率

cv:
  strategy: group_kfold
  n_splits: 5

features:
  include_full_spectra: true
  include_summary: true
  include_bands: true
  pca_components: 24
  metadata:
    numeric: true
    one_hot_species: false
  preprocess_blocks:
    - name: raw
      params:
        prefix: raw
    - name: snv
      params:
        prefix: snv
    - name: msc
      params:
        prefix: msc
    - name: savgol
      params:
        prefix: sg1
        window_length: 25
        polyorder: 2
        deriv: 1
    - name: savgol
      params:
        prefix: sg2
        window_length: 25
        polyorder: 2
        deriv: 2

models:
  - name: pls
    params:
      n_components: 30
  - name: ridge
    params:
      alpha: 30.0
  - name: extra_trees
    params:
      n_estimators: 600
      max_features: 0.55
      min_samples_leaf: 2
  - name: lightgbm
    params:
      objective: regression
      n_estimators: 900
      learning_rate: 0.025
      num_leaves: 48
      min_child_samples: 8
      subsample: 0.9
      colsample_bytree: 0.7
      reg_alpha: 0.05
      reg_lambda: 3.0
      n_jobs: 1
      force_col_wise: true
  - name: catboost
    params:
      iterations: 1200
      learning_rate: 0.03
      depth: 5
      l2_leaf_reg: 5.0

optuna:
  enabled: true
  n_trials: 8

ensemble:
  weights: {}

postprocess:
  clip:
    enabled: true
    min: 0

artifacts:
  save_models: false
